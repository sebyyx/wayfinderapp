name: Deploy to Hetzner

# Auto-deploys on every push to main, or manually from the Actions tab.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Never run two deploys at once; let the in-flight one finish.
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -p "${{ secrets.SSH_PORT || '22' }}" -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync code to server
        run: |
          rsync -az --delete \
            --exclude '.git' \
            --exclude 'node_modules' \
            --exclude '.next' \
            --exclude '.env' \
            -e "ssh -i ~/.ssh/id_deploy -p ${{ secrets.SSH_PORT || '22' }}" \
            ./ "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/opt/wayfinder-web/"

      - name: Build & restart
        run: |
          ssh -i ~/.ssh/id_deploy -p "${{ secrets.SSH_PORT || '22' }}" \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            'set -e; cd /opt/wayfinder-web && docker compose up -d --build && docker image prune -f'

      - name: Clean up key
        if: always()
        run: rm -f ~/.ssh/id_deploy
